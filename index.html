<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美年大健康 · 智能体检套餐</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: linear-gradient(145deg, #f0f4fa 0%, #e6edf6 100%); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; padding:20px 16px 80px; color:#1e293b; min-height:100vh; }
        .container { max-width:1440px; margin:0 auto; position:relative; }

        .brand-badge-bottom {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            padding: 6px 24px 6px 10px;
            border-radius: 60px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.15);
            border: 1px solid rgba(255,215,150,0.20);
            font-size: 16px;
            color:#000000;
            letter-spacing: 2px;
            text-shadow:none; 
            display: inline-flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
        }
        .brand-badge-bottom .divider { opacity:0.4; font-weight:300; margin:0 4px; }
        .brand-badge-bottom .icon { font-size:14px; margin-left:4px; opacity:0.9; }
        @media (max-width:640px) {
            .brand-badge-bottom { font-size:13px; padding:4px 16px; gap:4px; flex-wrap:wrap; justify-content:center; white-space:normal; }
        }

        .header { display:flex; align-items:center; gap:14px; margin-bottom:24px; flex-wrap:wrap; background:rgba(255,255,255,0.6); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); padding:12px 24px; border-radius:60px; box-shadow:0 2px 12px rgba(0,0,0,0.04); border:1px solid rgba(255,255,255,0.7); }
        .header h1 { font-size:24px; font-weight:600; color:#0b2b4a; display:flex; align-items:center; gap:8px; flex:1; }
        .header h1 .icon-med { font-size:28px; background:linear-gradient(135deg,#1a6bb0,#3a8fd4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .header h1 small { font-size:14px; font-weight:400; color:#5f7d9c; -webkit-text-fill-color:#5f7d9c; }
        .tab-bar { display:flex; gap:4px; background:rgba(255,255,255,0.5); padding:4px; border-radius:40px; border:1px solid rgba(255,255,255,0.8); margin-left:auto; }
        .tab-btn { padding:8px 22px; border:none; background:transparent; border-radius:30px; font-size:14px; font-weight:500; cursor:pointer; transition:0.2s; color:#5f7d9c; }
        .tab-btn.active { background:#1a6bb0; color:#fff; box-shadow:0 2px 8px rgba(26,107,176,0.25); }
        .tab-btn:hover:not(.active) { background:rgba(255,255,255,0.6); }

        .tab-content { display:none; animation:fade 0.25s ease; }
        .tab-content.active { display:block; }
        @keyframes fade { 0%{opacity:0.6;transform:translateY(4px);} 100%{opacity:1;transform:translateY(0);} }

        .card { background:rgba(255,255,255,0.85); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); border-radius:24px; box-shadow:0 8px 32px rgba(0,20,40,0.08), 0 2px 8px rgba(0,0,0,0.02); padding:20px 24px 24px; border:1px solid rgba(255,255,255,0.6); margin-top:4px; transition:box-shadow 0.3s; }
        .card:hover { box-shadow:0 12px 40px rgba(0,20,40,0.12); }
        .card-header { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:18px; }
        .card-header h2 { font-size:20px; font-weight:600; color:#1a3a5c; display:flex; align-items:center; gap:10px; }
        .card-header h2 .icon-header { font-size:24px; color:#1a6bb0; }
        .badge { background:linear-gradient(135deg,#e5eff9,#d4e2f0); color:#1a5a9c; font-size:13px; padding:2px 14px; border-radius:30px; font-weight:500; box-shadow:inset 0 1px 2px rgba(255,255,255,0.6); }
        .toolbar { display:flex; flex-wrap:wrap; align-items:center; gap:10px; }

        .search-box {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.8);
            border: 1px solid #d0d9e5;
            border-radius: 40px;
            padding: 0 16px;
            min-width: 320px;
            transition: 0.3s;
            backdrop-filter: blur(4px);
            z-index: 1000;
        }
        .search-box:focus-within {
            border-color: #1a6bb0;
            box-shadow: 0 0 0 3px rgba(26,107,176,0.12);
            background: #fff;
            z-index: 1001;
        }
        .search-box input { border:none; background:transparent; padding:10px 6px; font-size:14px; flex:1; outline:none; color:#1e293b; }
        .search-box input::placeholder { color:#94a9c2; }
        .search-box .icon { color:#7a95b0; font-size:18px; line-height:1; margin-right:4px; }

        .search-results {
            position: absolute;
            top: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            max-height: 60vh;
            overflow-y: auto;
            z-index: 2000;
            display: none;
            border: 1px solid rgba(255,255,255,0.3);
            width: 820px;
            max-width: 92vw;
            backdrop-filter: blur(8px);
        }
        .search-results.show { display:block; }
        .search-results .item {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
            gap: 14px;
            white-space: nowrap;
            transition: 0.1s;
        }
        .search-results .item:hover { background:#f0f7ff; }
        .search-results .item .name { font-weight:500; flex:1 1 auto; min-width:120px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .search-results .item .price-tag { font-size:13px; color:#1a6bb0; background:#e5eff9; padding:2px 14px; border-radius:30px; flex:0 0 auto; white-space:nowrap; }
        .search-results .item .code { font-size:12px; color:#7a95b0; flex:0 0 auto; white-space:nowrap; }

        .btn { padding:8px 20px; border-radius:40px; border:none; font-weight:500; font-size:14px; cursor:pointer; transition:0.2s; display:inline-flex; align-items:center; gap:6px; background:rgba(238,243,248,0.8); backdrop-filter:blur(4px); color:#1a3a5c; border:1px solid rgba(255,255,255,0.3); }
        .btn-primary { background:linear-gradient(135deg,#1a6bb0,#2a7de1); color:#fff; border:none; box-shadow:0 4px 12px rgba(26,107,176,0.25); }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(26,107,176,0.35); }
        .btn-success { background:linear-gradient(135deg,#0f7b3e,#1a9c54); color:#fff; border:none; box-shadow:0 4px 12px rgba(15,123,62,0.25); }
        .btn-success:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(15,123,62,0.35); }
        .btn-danger { background:linear-gradient(135deg,#c73a3a,#e04a4a); color:#fff; border:none; }
        .btn-danger:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(199,58,58,0.3); }
        .btn-outline { background:transparent; border:1px solid #cbd5e1; backdrop-filter:none; }
        .btn-outline:hover { background:rgba(255,255,255,0.5); }
        .btn-sm { padding:4px 14px; font-size:13px; }

        .table-wrap { overflow-x:auto; margin-top:6px; border-radius:16px; background:rgba(255,255,255,0.3); padding:2px; }
        table { width:100%; border-collapse:collapse; font-size:13px; background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.02); min-width: 900px; }
        table th { background:#f7fafc; color:#1a3a5c; font-weight:600; padding:12px 10px; text-align:left; border-bottom:2px solid #d0d9e5; white-space:nowrap; font-size:12px; letter-spacing:0.3px; position:sticky; top:0; z-index:10; }
        table td { padding:10px 10px; border-bottom:1px solid #eef2f6; vertical-align:middle; }
        table tr:last-child td { border-bottom:none; }
        table tr:hover td { background:#fafcff; }

        .col-code { min-width:100px; color:#607d8b; font-size:12px; }
        .col-name { min-width:150px; font-weight:500; }
        .col-items { min-width:130px; color:#3d5a78; font-size:12px; }
        .col-meaning { min-width:170px; color:#4a6a8a; font-size:12px; line-height:1.4; }
        .col-price { min-width:65px; text-align:center; font-weight:500; }
        .col-remark { min-width:100px; font-size:12px; color:#7a8fa8; }
        .col-action { min-width:55px; text-align:center; }

        .price-male { color:#1a5a9c; }
        .price-female { color:#b13a7a; }
        .no-discount-tag { background:#fef3c7; color:#9b6b0a; font-size:10px; padding:1px 12px; border-radius:30px; display:inline-block; font-weight:500; }

        .footer-row td { background:#f7fafc !important; font-weight:600; border-top:2px solid #d0d9e5; }
        .footer-row-mandatory td { background:#fff3e0 !important; color:#b15a1a; }
        .footer-row-free td { background:#f0f7ee !important; color:#1f6b3a; }
        .footer-row-total td { background:#eaf1fa !important; font-size:15px; }
        .footer-row-discount td { background:#fef9e7 !important; }
        .footer-row input { width:100px; padding:6px 10px; border:1px solid #cbd5e1; border-radius:8px; font-size:14px; text-align:center; font-weight:600; background:#fff; direction:ltr; }
        .footer-row input:focus { border-color:#1a6bb0; outline:none; box-shadow:0 0 0 3px rgba(26,107,176,0.12); }
        .discount-rate { font-size:18px; font-weight:700; color:#1a5a9c; }
        .discount-rate.good { color:#0f7b3e; }
        .discount-rate.bad { color:#b13a3a; }

        .editable-input { border:1px solid transparent; background:transparent; padding:4px 6px; border-radius:6px; font-size:13px; width:100%; transition:0.15s; color:#1e293b; }
        .editable-input:hover { background:#f8fafc; border-color:#d0d9e5; }
        .editable-input:focus { background:#fff; border-color:#1a6bb0; outline:none; box-shadow:0 0 0 3px rgba(26,107,176,0.08); }
        .editable-input.price-input { text-align:center; font-weight:500; width:70px; }
        .price-input-sm { width:62px; padding:4px 4px; border:1px solid #d0d9e5; border-radius:6px; text-align:center; font-size:13px; font-weight:500; background:#fff; transition:0.15s; }
        .price-input-sm:focus { border-color:#1a6bb0; outline:none; box-shadow:0 0 0 3px rgba(26,107,176,0.08); }
        .price-input-sm:hover { background:#f8fafc; }

        .empty-state { text-align:center; padding:40px 20px; color:#7a95b0; }
        .master-search { margin-bottom:14px; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
        .master-search input { padding:8px 18px; border:1px solid #d0d9e5; border-radius:40px; font-size:14px; flex:1; min-width:200px; outline:none; background:rgba(255,255,255,0.7); backdrop-filter:blur(4px); transition:0.2s; }
        .master-search input:focus { border-color:#1a6bb0; background:#fff; box-shadow:0 0 0 3px rgba(26,107,176,0.08); }

        @media (max-width:768px) {
            .header { flex-direction:column; align-items:stretch; padding:16px; border-radius:30px; }
            .tab-bar { margin-left:0; }
            .card { padding:16px; }
            .search-box { min-width:100%; }
            .toolbar { flex-direction:column; align-items:stretch; }
            .card-header { flex-direction:column; align-items:stretch; }
            table { font-size:12px; }
            table th, table td { padding:6px 4px; }
            .col-meaning { min-width:100px; }
            .footer-row input { width:70px; }
            .price-input-sm { width:50px; }
            .search-results { width:95vw; left:50%; transform:translateX(-50%); }
            .search-results .item .name { min-width:60px; }
        }
    </style>
</head>

function hasPrice(item) {
    return (item.priceM!==null && item.priceM!==undefined) ||
           (item.priceF!==null && item.priceF!==undefined) ||
           (item.priceFM!==null && item.priceFM!==undefined);
}
function isFree(item) { return item.priceM===0 && item.priceF===0 && item.priceFM===0; }
function isNoDiscount(item) { return item.noDiscount === true || (item.remark && (item.remark.includes('无折扣') || item.remark.includes('优惠价') || item.remark.includes('不可折'))); }
function getAllItems() { return [...projects, ...FREE_ITEMS]; }
function findItem(uid) { return getAllItems().find(p=>p.uid===uid); }
function getMandatoryItems() { return MANDATORY_ITEMS; }

function renderPackageBody() {
    const tbody = document.getElementById('packageBody');
    const selectedItems = selectedIds.map(uid=>findItem(uid)).filter(Boolean);
    document.getElementById('selectedCount').textContent = `已选 ${selectedItems.length} 项 + ${getMandatoryItems().length} 项必加`;

    if(selectedItems.length===0) {
        html = `<tr><td colspan="9" class="empty-state">暂无项目，请从上方搜索添加</td></tr>`;
    } else {
        selectedItems.forEach((item,idx)=>{
            const itemsStr = Array.isArray(item.items) ? item.items.join('、') : item.items||'';
            const noDisc = isNoDiscount(item);
            let displayId = item.id;

                displayId = 'GP230303406';

            footerHtml += `<tr class="footer-row-free">
                <td>${freeStartIdx+idx+1}</td>
                <td class="col-code">${displayId}</td>
                <td class="col-name">${item.name}</td>
                <td class="col-items">${itemsStr}</td>
                <td class="col-meaning">${item.meaning||''}</td>
                <td class="col-price price-male">¥0</td>
                <td class="col-price price-female">¥0</td>
                <td class="col-price price-female">¥0</td>
                <td class="col-action">—</td>
            </tr>`;
        });
        const totals = calculateTotals(allItems);
        const noDiscTotals = calculateNoDiscountTotals(allItems);
        footerHtml += `<tr class="footer-row footer-row-total" style="background:#f4f8fe !important;">
            <td colspan="5" style="text-align:right;font-weight:700;">无折扣项目总价</td>
            <td class="col-price price-male">¥${noDiscTotals.male.toFixed(2)}</td>
            <td class="col-price price-female">¥${noDiscTotals.female.toFixed(2)}</td>
            <td class="col-price price-female">¥${noDiscTotals.femaleMarried.toFixed(2)}</td>
            <td colspan="2"></td>
        </tr>`;
        footerHtml += `<tr class="footer-row footer-row-total">
            <td colspan="5" style="text-align:right;font-weight:700;">门市价合计</td>
            <td class="col-price price-male">¥${totals.male.toFixed(2)}</td>
            <td class="col-price price-female">¥${totals.female.toFixed(2)}</td>
            <td class="col-price price-female">¥${totals.femaleMarried.toFixed(2)}</td>
            <td colspan="2"></td>
        </tr>`;
        const discMale = parseFloat(discMaleVal)||0;
        const discFemale = parseFloat(discFemaleVal)||0;
        const discFemaleMarried = parseFloat(discFemaleMarriedVal)||0;
        footerHtml += `<tr class="footer-row footer-row-discount">
            <td colspan="5" style="text-align:right;font-weight:700;">优惠价（输入）</td>
            <td class="col-price"><input type="text" id="discountMale" value="${discMaleVal}" style="width:90px;text-align:center;direction:ltr;" oninput="this.value=this.value.replace(/[^0-9.]/g,''); renderPackageFooter();"></td>
            <td class="col-price"><input type="text" id="discountFemale" value="${discFemaleVal}" style="width:90px;text-align:center;direction:ltr;" oninput="this.value=this.value.replace(/[^0-9.]/g,''); renderPackageFooter();"></td>
            <td class="col-price"><input type="text" id="discountFemaleMarried" value="${discFemaleMarriedVal}" style="width:90px;text-align:center;direction:ltr;" oninput="this.value=this.value.replace(/[^0-9.]/g,''); renderPackageFooter();"></td>
            <td colspan="2"></td>
        </tr>`;
        const calcRate = (disc,total,noDisc)=>{ const base=total-noDisc; if(base===0)return 0; const eff=disc-noDisc; if(eff<0)return 0; return eff/base; };
        const rateMale=calcRate(discMale,totals.male,noDiscTotals.male);
        const rateFemale=calcRate(discFemale,totals.female,noDiscTotals.female);
        const rateFemaleMarried=calcRate(discFemaleMarried,totals.femaleMarried,noDiscTotals.femaleMarried);
        const fmtRate=r=>{ if(r===0)return '0%'; return (r*100).toFixed(2)+'%'; };
        footerHtml += `<tr class="footer-row footer-row-discount">
            <td colspan="5" style="text-align:right;font-weight:700;">折扣</td>
            <td class="col-price price-male discount-rate ${rateMale>=0.5?'good':'bad'}">${fmtRate(rateMale)}</td>
            <td class="col-price price-female discount-rate ${rateFemale>=0.5?'good':'bad'}">${fmtRate(rateFemale)}</td>
            <td class="col-price price-female discount-rate ${rateFemaleMarried>=0.5?'good':'bad'}">${fmtRate(rateFemaleMarried)}</td>
            <td colspan="2"></td>
        </tr>`;
        tfoot.innerHTML = footerHtml;
        const newDiscMale = document.getElementById('discountMale');
        const newDiscFemale = document.getElementById('discountFemale');
        const newDiscFemaleMarried = document.getElementById('discountFemaleMarried');
        if(newDiscMale) newDiscMale.value = discMaleVal;
        if(newDiscFemale) newDiscFemale.value = discFemaleVal;
        if(newDiscFemaleMarried) newDiscFemaleMarried.value = discFemaleMarriedVal;
        if(focusedId==='discountMale' && newDiscMale){ newDiscMale.focus(); newDiscMale.setSelectionRange(newDiscMale.value.length,newDiscMale.value.length); }
        else if(focusedId==='discountFemale' && newDiscFemale){ newDiscFemale.focus(); newDiscFemale.setSelectionRange(newDiscFemale.value.length,newDiscFemale.value.length); }
        else if(focusedId==='discountFemaleMarried' && newDiscFemaleMarried){ newDiscFemaleMarried.focus(); newDiscFemaleMarried.setSelectionRange(newDiscFemaleMarried.value.length,newDiscFemaleMarried.value.length); }
        footerUpdateTimer = null;
    },10);
}
function renderPackage(){ renderPackageBody(); renderPackageFooter(); }

function updatePrice(input){
    const uid = input.dataset.uid;
    const gender = input.dataset.gender;
    const val = parseFloat(input.value);
    const item = projects.find(p=>p.uid===uid);
    if(!item) return;
    const num = isNaN(val) ? null : val;
    if(gender==='M') item.priceM = num;
    else if(gender==='F') item.priceF = num;
    else if(gender==='FM') item.priceFM = num;
    renderPackageFooter();
}
function calculateTotals(items){ let m=0,f=0,fa=0; items.forEach(item=>{ if(item.priceM!==null&&item.priceM!==undefined) m+=item.priceM; if(item.priceF!==null&&item.priceF!==undefined) f+=item.priceF; if(item.priceFM!==null&&item.priceFM!==undefined) fa+=item.priceFM; }); return {male:m, female:f, femaleMarried:fa}; }
function calculateNoDiscountTotals(items){ let m=0,f=0,fa=0; items.forEach(item=>{ if(isNoDiscount(item)){ if(item.priceM!==null&&item.priceM!==undefined) m+=item.priceM; if(item.priceF!==null&&item.priceF!==undefined) f+=item.priceF; if(item.priceFM!==null&&item.priceFM!==undefined) fa+=item.priceFM; } }); return {male:m, female:f, femaleMarried:fa}; }
function removeSelected(uid){ selectedIds = selectedIds.filter(pid=>pid!==uid); renderPackage(); }

// ============================================================
// 项目总表
// ============================================================
function renderMaster(filter=''){
    const tbody = document.getElementById('masterBody');
    let filtered = projects;
    if(filter.trim()){
        const q = filter.toLowerCase();
        filtered = projects.filter(p=>p.name.toLowerCase().includes(q)||(p.id&&p.id.toLowerCase().includes(q))||(Array.isArray(p.items)&&p.items.some(i=>i.toLowerCase().includes(q))));
    }
    document.getElementById('masterCount').textContent = `共 ${filtered.length} 项`;
    let html='';
    filtered.forEach((item,idx)=>{
        const itemsStr = Array.isArray(item.items)?item.items.join('、'):item.items||'';
        html += `<tr>
            <td>${idx+1}</td>
            <td><input class="editable-input" data-field="id" data-uid="${item.uid}" value="${item.id}" style="font-size:12px;"></td>
            <td><input class="editable-input" data-field="name" data-uid="${item.uid}" value="${item.name}"></td>
            <td><input class="editable-input" data-field="items" data-uid="${item.uid}" value="${itemsStr}"></td>
            <td><input class="editable-input" data-field="meaning" data-uid="${item.uid}" value="${item.meaning||''}"></td>
            <td><input class="editable-input price-input" data-field="priceM" data-uid="${item.uid}" value="${item.priceM!==null&&item.priceM!==undefined?item.priceM:''}" style="width:60px;"></td>
            <td><input class="editable-input price-input" data-field="priceF" data-uid="${item.uid}" value="${item.priceF!==null&&item.priceF!==undefined?item.priceF:''}" style="width:60px;"></td>
            <td><input class="editable-input price-input" data-field="priceFM" data-uid="${item.uid}" value="${item.priceFM!==null&&item.priceFM!==undefined?item.priceFM:''}" style="width:60px;"></td>
            <td><input class="editable-input" data-field="remark" data-uid="${item.uid}" value="${item.remark||''}"></td>
            <td class="col-action"><button class="btn btn-danger btn-sm" onclick="deleteProject('${item.uid}')">✕</button></td>
        </tr>`;
    });
    tbody.innerHTML = html;
    document.querySelectorAll('#masterBody .editable-input').forEach(input=>{
        input.addEventListener('change',function(){
            const uid=this.dataset.uid; const field=this.dataset.field; const val=this.value;
            const item=projects.find(p=>p.uid===uid); if(!item)return;
            if(field==='items'){ item.items=val.split(/[，,、\s]+/).filter(s=>s.trim()!==''); }
            else if(field==='priceM'||field==='priceF'||field==='priceFM'){ const num=parseFloat(val); item[field]=isNaN(num)?null:num; }
            else { item[field]=val; }
            renderPackage(); renderMaster(document.getElementById('masterSearchInput').value);
        });
    });
}
function deleteProject(uid){ if(!confirm('确定删除该项目吗？'))return; projects=projects.filter(p=>p.uid!==uid); selectedIds=selectedIds.filter(pid=>pid!==uid); renderMaster(document.getElementById('masterSearchInput').value); renderPackage(); }
function addProject(){ const newId='new_'+Date.now(); const newUid = newId + '_' + Date.now(); projects.push({uid:newUid, id:newId, name:'新项目',items:['细项1'],priceM:null,priceF:null,priceFM:null,meaning:'',remark:'',noDiscount:false}); renderMaster(document.getElementById('masterSearchInput').value); renderPackage(); }

function exportData(){ const data=JSON.stringify(projects,null,2); const blob=new Blob([data],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='体检项目数据.json'; a.click(); URL.revokeObjectURL(a.href); }
function importData(){ const input=document.createElement('input'); input.type='file'; input.accept='.json'; input.onchange=function(e){ const file=e.target.files[0]; if(!file)return; const reader=new FileReader(); reader.onload=function(ev){ try{ const data=JSON.parse(ev.target.result); if(Array.isArray(data)){ projects=data; selectedIds=selectedIds.filter(uid=>projects.some(p=>p.uid===uid)); renderMaster(document.getElementById('masterSearchInput').value); renderPackage(); alert('数据导入成功！'); }else{alert('无效的数据格式');} }catch(err){ alert('导入失败：'+err.message); } }; reader.readAsText(file); }; input.click(); }

// ============================================================
// 下载套餐
// ============================================================
function downloadPackage() {
    const selectedItems = selectedIds.map(uid=>findItem(uid)).filter(Boolean);
    const mandatory = getMandatoryItems();
    const allItems = [...selectedItems, ...mandatory, ...FREE_ITEMS];
    const filteredItems = allItems;
    if(filteredItems.length===0){ alert('请先添加项目！'); return; }

    const startRow = 2;
    const endRow = startRow + filteredItems.length - 1;
    const noDiscRow = endRow + 1;
    const totalRow = endRow + 2;
    const discRow = endRow + 3;
    const rateRow = endRow + 4;

    const colM = 'F';
    const colF = 'G';
    const colFM = 'H';
    const colFlag = 'I';

    const maleTotalFormula = `=SUM(${colM}${startRow}:${colM}${endRow})`;
    const femaleTotalFormula = `=SUM(${colF}${startRow}:${colF}${endRow})`;
    const femaleMarriedTotalFormula = `=SUM(${colFM}${startRow}:${colFM}${endRow})`;

    const noDiscMaleFormula = `=SUMIF(${colFlag}${startRow}:${colFlag}${endRow},"无折扣",${colM}${startRow}:${colM}${endRow})`;
    const noDiscFemaleFormula = `=SUMIF(${colFlag}${startRow}:${colFlag}${endRow},"无折扣",${colF}${startRow}:${colF}${endRow})`;
    const noDiscFemaleMarriedFormula = `=SUMIF(${colFlag}${startRow}:${colFlag}${endRow},"无折扣",${colFM}${startRow}:${colFM}${endRow})`;

    const discMale = parseFloat(document.getElementById('discountMale')?.value)||0;
    const discFemale = parseFloat(document.getElementById('discountFemale')?.value)||0;
    const discFemaleMarried = parseFloat(document.getElementById('discountFemaleMarried')?.value)||0;

    const maleRateFormula = `=IFERROR((${colM}${discRow} - ${colM}${noDiscRow}) / (${colM}${totalRow} - ${colM}${noDiscRow}), 0)`;
    const femaleRateFormula = `=IFERROR((${colF}${discRow} - ${colF}${noDiscRow}) / (${colF}${totalRow} - ${colF}${noDiscRow}), 0)`;
    const femaleMarriedRateFormula = `=IFERROR((${colFM}${discRow} - ${colFM}${noDiscRow}) / (${colFM}${totalRow} - ${colFM}${noDiscRow}), 0)`;

    let html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet><x:Name>套餐</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->
<style>
    td { mso-number-format:"0.00"; }
    .rate { mso-number-format:"0.00%"; }
    .hidden-col { display: none !important; visibility: hidden !important; width: 0px !important; mso-width-source: userset; mso-width: 0 !important; padding: 0 !important; border: none !important; font-size: 0px !important; }
</style>
</head><body><table border="1" cellpadding="3" style="font-size:12px; font-family: Arial, sans-serif;">
    <colgroup>
        <col style="width: 30px;">
        <col style="width: 80px;">
        <col style="width: 120px;">
        <col style="width: 120px;">
        <col style="width: 180px;">
        <col style="width: 70px;">
        <col style="width: 70px;">
        <col style="width: 70px;">
        <col class="hidden-col">
    </colgroup>`;
    
    html += `<tr>
        <th>序号</th><th>项目编码</th><th>项目名称</th><th>细项</th><th>临床意义</th>
        <th>男性价格</th><th>未婚女价格</th><th>已婚女价格</th>
        <th class="hidden-col"></th>
    </tr>`;
    
    filteredItems.forEach((item, idx) => {
        const itemsStr = Array.isArray(item.items) ? item.items.join('、') : item.items || '';
        const priceM = (item.priceM !== null && item.priceM !== undefined) ? item.priceM : '';
        const priceF = (item.priceF !== null && item.priceF !== undefined) ? item.priceF : '';
        const priceFM = (item.priceFM !== null && item.priceFM !== undefined) ? item.priceFM : '';
        const name = item.name;
        const isNoDiscTag = isNoDiscount(item) ? '无折扣' : '';
        let displayId = item.id;
        if (item.name === '营养早餐' && item.remark === '满赠') {
            displayId = 'GP230303406';
        }
        html += `<tr>
            <td style="mso-number-format:0;">${idx+1}</td>
            <td>${displayId}</td>
            <td>${name}</td>
            <td>${itemsStr}</td>
            <td>${item.meaning||''}</td>
            <td>${priceM}</td>
            <td>${priceF}</td>
            <td>${priceFM}</td>
            <td class="hidden-col">${isNoDiscTag}</td>
        </tr>`;
    });

    html += `<tr><td colspan="5" style="text-align:right;">无折扣项目总价</td>
        <td>${noDiscMaleFormula}</td>
        <td>${noDiscFemaleFormula}</td>
        <td>${noDiscFemaleMarriedFormula}</td>
        <td class="hidden-col"></td></tr>`;
    html += `<tr><td colspan="5" style="text-align:right;">门市价合计</td>
        <td>${maleTotalFormula}</td>
        <td>${femaleTotalFormula}</td>
        <td>${femaleMarriedTotalFormula}</td>
        <td class="hidden-col"></td></tr>`;
    html += `<tr><td colspan="5" style="text-align:right;">优惠价</td>
        <td>${discMale.toFixed(2)}</td>
        <td>${discFemale.toFixed(2)}</td>
        <td>${discFemaleMarried.toFixed(2)}</td>
        <td class="hidden-col"></td></tr>`;
    html += `<tr><td colspan="5" style="text-align:right;">折扣</td>
        <td class="rate">${maleRateFormula}</td>
        <td class="rate">${femaleRateFormula}</td>
        <td class="rate">${femaleMarriedRateFormula}</td>
        <td class="hidden-col"></td></tr>`;

    // 7 行备注，字体大小与项目行一致（12px）
    html += `<tr><td colspan="8" style="text-align:left;font-size:12px;background:#fcfcfc;border-top:2px solid #d0d9e5;padding:4px 8px;">备注：套餐导入系统时</td><td class="hidden-col"></td></tr>`;
    html += `<tr><td colspan="8" style="text-align:left;font-size:12px;background:#fcfcfc;padding:4px 8px;">1、删除序号列</td><td class="hidden-col"></td></tr>`;
    html += `<tr><td colspan="8" style="text-align:left;font-size:12px;background:#fcfcfc;padding:4px 8px;">2、非"G"开头编码项目需手工录入。</td><td class="hidden-col"></td></tr>`;
    html += `<tr><td colspan="8" style="text-align:left;font-size:12px;background:#fcfcfc;padding:4px 8px;">3、删除"细项"，"临床意义"列清除内容或删除后男性列左侧新增空白行。</td><td class="hidden-col"></td></tr>`;
    html += `<tr><td colspan="8" style="text-align:left;font-size:12px;background:#fcfcfc;padding:4px 8px;">4、男女有价格的项目统一更换为文字"是"。</td><td class="hidden-col"></td></tr>`;
    html += `<tr><td colspan="8" style="text-align:left;font-size:12px;background:#fcfcfc;padding:4px 8px;">5、这5行：报告咨询、无折扣项目总价、门市价、优惠价、折扣删除或复制时排除。</td><td class="hidden-col"></td></tr>`;
    html += `<tr><td colspan="8" style="text-align:left;font-size:12px;background:#fcfcfc;padding:4px 8px;border-bottom:1px solid #d0d9e5;">6、复制以上操作后的内容粘贴导入模板即可系统导入套餐。</td><td class="hidden-col"></td></tr>`;

    html += `</table></body></html>`;

    const blob = new Blob([html], {type: 'application/vnd.ms-excel;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '体检套餐.xls';
    a.click();
    URL.revokeObjectURL(a.href);
}
document.getElementById('downloadBtn').addEventListener('click', downloadPackage);

// ============================================================
// 搜索下拉
// ============================================================
const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');
function renderSearchResults(query){
    const all = getAllItems();
    let matches = all.filter(item=>{
        if(item.id && item.id.startsWith('free_')) return false;
        if(selectedIds.includes(item.uid)) return false;
        if(!hasPrice(item)) return false;
        const q = query.toLowerCase().trim();
        if(!q) return true;
        return item.name.toLowerCase().includes(q) || (item.id && item.id.toLowerCase().includes(q)) || (Array.isArray(item.items)&&item.items.some(i=>i.toLowerCase().includes(q)));
    });
    if(matches.length===0){ searchResults.innerHTML=`<div class="item" style="color:#7a95b0;cursor:default;justify-content:center;">没有匹配的项目</div>`; }
    else{
        let html='';
        matches.forEach(item=>{
            const priceStr = [];
            if(item.priceM!==null&&item.priceM!==undefined) priceStr.push(`男¥${item.priceM}`);
            if(item.priceF!==null&&item.priceF!==undefined) priceStr.push(`未婚¥${item.priceF}`);
            if(item.priceFM!==null&&item.priceFM!==undefined) priceStr.push(`已婚¥${item.priceFM}`);
            html += `<div class="item" data-uid="${item.uid}">
                <span class="name">${item.name}</span>
                <span><span class="price-tag">${priceStr.join(' ')}</span><span class="code">${item.id}</span></span>
            </div>`;
        });
        searchResults.innerHTML = html;
        searchResults.querySelectorAll('.item').forEach(el=>{
            el.addEventListener('click',function(){
                const uid=this.dataset.uid;
                if(!selectedIds.includes(uid)){ selectedIds.push(uid); renderPackage(); searchInput.value=''; searchResults.classList.remove('show'); }
                else { alert('项目已添加'); }
            });
        });
    }
}
searchInput.addEventListener('input',function(){ const q=this.value; renderSearchResults(q); if(q.trim()==='')renderSearchResults(''); searchResults.classList.add('show'); });
searchInput.addEventListener('focus',function(){ if(this.value.trim()==='')renderSearchResults(''); searchResults.classList.add('show'); });
document.addEventListener('click',function(e){ if(!e.target.closest('.search-box')) searchResults.classList.remove('show'); });
